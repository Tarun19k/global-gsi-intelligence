[server]
headless = true
enableCORS = false
enableXsrfProtection = true
maxUploadSize = 10

[browser]
gatherUsageStats = false

[runner]
magicEnabled = false
fastReruns = true

[client]
showErrorDetails = "none"
toolbarMode = "minimal"

[theme]
base = "dark"
primaryColor = "#4f8ef7"
backgroundColor = "#0e1117"
secondaryBackgroundColor = "#1e2130"
textColor = "#c8cee8"
font = "sans serif"
